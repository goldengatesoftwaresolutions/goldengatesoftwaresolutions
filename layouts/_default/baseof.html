<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  </head>
  <body>
    <header>
      <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </body>
</html>
